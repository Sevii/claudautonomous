services:
  kanboard:
    image: kanboard/kanboard:v1.2.49
    restart: always
    ports:
      - "${KANBOARD_PORT:-8080}:80"
    volumes:
      - kanboard_data:/var/www/app/data
      - kanboard_plugins:/var/www/app/plugins
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER:-kanboard}:${POSTGRES_PASSWORD:-kanboard}@db/${POSTGRES_DB:-kanboard}
      - PLUGIN_INSTALLER=${PLUGIN_INSTALLER:-true}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-kanboard}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-kanboard}
      - POSTGRES_DB=${POSTGRES_DB:-kanboard}
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-kanboard}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  kanboard_data:
    driver: local
  kanboard_plugins:
    driver: local
  postgres_data:
    driver: local
